<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="screen-orientation" content="landscape">
<meta name="x5-orientation" content="landscape">
<meta name="full-screen" content="yes">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;width:100vw;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;}
#gc{position:relative;flex-shrink:0;}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;}

#ui{position:absolute;bottom:0;left:0;right:0;display:flex;justify-content:space-between;flex-wrap:wrap;padding:5px 12px;background:rgba(10,10,6,0.72);border-top:1px solid rgba(60,60,40,0.5);gap:4px;pointer-events:none;}
#ui span{font-family:monospace;font-size:12px;color:#a0a080;}

#msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(10,10,6,0.92);border:1px solid #a0a080;padding:20px 32px;text-align:center;font-size:15px;line-height:2;pointer-events:none;display:none;white-space:nowrap;color:#b8b89a;font-family:monospace;z-index:20;}

#ss{position:absolute;inset:0;background:rgba(8,8,5,0.97);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:10;}
#ss h1{font-size:28px;color:#c8c8a0;letter-spacing:4px;font-family:monospace;}
#ss p{font-size:13px;color:#808068;line-height:1.8;text-align:center;font-family:monospace;}
button{background:#181810;border:1px solid #a0a080;color:#c8c8a0;padding:10px 28px;font-family:monospace;font-size:14px;cursor:pointer;letter-spacing:2px;}
button:hover{background:#252518;}

#dpad{position:absolute;bottom:12px;left:10px;display:none;user-select:none;-webkit-user-select:none;}
#dpad-center{position:relative;width:120px;height:120px;}
.dp-btn{position:absolute;width:44px;height:44px;background:rgba(200,168,75,0.18);border:1px solid rgba(200,168,75,0.4);display:flex;align-items:center;justify-content:center;font-size:20px;color:rgba(200,168,75,0.7);border-radius:6px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
#dp-up{top:0;left:38px;} #dp-down{bottom:0;left:38px;} #dp-left{top:38px;left:0;} #dp-right{top:38px;right:0;}
@media(hover:none) and (pointer:coarse){ #dpad{display:block;} }

/* 세로 모드일 때 회전 안내 오버레이 */
#rotate-msg{
  display:none;
  position:fixed;inset:0;z-index:100;
  background:#000;
  flex-direction:column;align-items:center;justify-content:center;gap:16px;
  color:#a0a080;font-family:monospace;font-size:14px;text-align:center;
}
#rotate-msg .icon{font-size:48px;animation:spin 1.5s ease-in-out infinite alternate;}
@keyframes spin{from{transform:rotate(-90deg);}to{transform:rotate(0deg);}}
@media(orientation:portrait) and (max-width:900px){
  #rotate-msg{display:flex;}
}
</style>
</head>
<body>
<div id="rotate-msg">
  <div class="icon">📱</div>
  <div>기기를 가로로 돌려주세요</div>
</div>
<div id="gc">
  <canvas id="canvas" width="600" height="480"></canvas>
  <div id="ui" style="display:none">
    <span id="battery"></span>
    <span id="sanity"></span>
    <span><span id="px"></span><span id="py"></span></span>
  </div>
  <div id="msg"></div>
  <div id="ss">
    <h1>BACKROOMS</h1>
    <p>당신은 현실에서 벗어나<br>끝없는 공간에 갇혔습니다.<br><br>
       탈출구를 찾아라.
    </p>
    <button onclick="lockLandscape();startGame()">— 입장 —</button>
    <button onclick="lockLandscape();startShowcase()" style="font-size:12px;opacity:0.75;padding:8px 20px;">— 구조물 확인 —</button>
  </div>
  <div id="dpad">
    <div id="dpad-center">
      <div class="dp-btn" id="dp-up">▲</div>
      <div class="dp-btn" id="dp-left">◀</div>
      <div class="dp-btn" id="dp-right">▶</div>
      <div class="dp-btn" id="dp-down">▼</div>
    </div>
  </div>
</div>
<script src="js/map.js?v=14"></script>
<script src="js/textures.js?v=14"></script>
<script src="js/lights.js?v=14"></script>
<script src="js/audio.js?v=14"></script>
<script src="js/entities.js?v=14"></script>
<script src="js/renderer.js?v=14"></script>
<script src="js/game.js?v=14"></script>
<script>
function resizeGame() {
  const BASE_W = 600, BASE_H = 480;
  const scaleX = window.innerWidth  / BASE_W;
  const scaleY = window.innerHeight / BASE_H;
  const scale  = Math.min(scaleX, scaleY);
  const w = Math.floor(BASE_W * scale);
  const h = Math.floor(BASE_H * scale);
  const gc     = document.getElementById('gc');
  const canvas = document.getElementById('canvas');
  gc.style.width      = w + 'px';
  gc.style.height     = h + 'px';
  canvas.style.width  = w + 'px';
  canvas.style.height = h + 'px';
}
window.addEventListener('resize', resizeGame);
resizeGame();

// 풀스크린 + 가로 고정 (버튼 클릭 이후에 호출해야 작동)
function lockLandscape() {
  // 풀스크린
  const el = document.documentElement;
  try {
    if      (el.requestFullscreen)       el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  } catch(e) {}
  // 가로 고정
  try {
    const s = screen.orientation || screen.msOrientation;
    if (s && s.lock) s.lock('landscape').catch(()=>{});
  } catch(e) {}
}
</script>
</body>
</html>
